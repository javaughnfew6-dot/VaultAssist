<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Azoul – Bank Halo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(circle at top, #0ea5e9 0%, #061a2e 40%, #041423 100%);
    font-family: "Segoe UI", Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  .center {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
  }

  .halo {
    position: relative;
    width: 360px;
    height: 360px;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px dashed rgba(255,255,255,0.25);
    box-shadow: 0 0 120px rgba(56,189,248,0.4);
  }

  .core {
    position: absolute;
    inset: 50%;
    width: 130px;
    height: 130px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.35), rgba(255,255,255,0.08));
    display: grid;
    place-items: center;
    box-shadow: 0 0 40px rgba(56,189,248,0.8);
  }

  .bank {
    text-align: center;
  }

  .bank svg {
    width: 64px;
    height: 64px;
    stroke: white;
  }

  .bank h1 {
    margin: 8px 0 0;
    font-size: 26px;
    letter-spacing: 2px;
  }

  .orbit {
    position: absolute;
    inset: 0;
  }

  .icon {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: grid;
    place-items: center;
    box-shadow: 0 0 16px rgba(56,189,248,0.8);
  }

  .icon svg {
    width: 22px;
    height: 22px;
    stroke: white;
  }

  /* Position icons around circle */
  .i1 { top: -8px; left: 50%; transform: translateX(-50%); }
  .i2 { top: 18%; right: -6px; }
  .i3 { top: 50%; right: -12px; transform: translateY(-50%); }
  .i4 { bottom: 18%; right: -6px; }
  .i5 { bottom: -8px; left: 50%; transform: translateX(-50%); }
  .i6 { bottom: 18%; left: -6px; }
  .i7 { top: 50%; left: -12px; transform: translateY(-50%); }
</style>
</head>

<body>

<div class="center">
  <div class="halo">

    <div class="ring"></div>

    <div class="core">
      <div class="bank">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6">
          <path d="M3 10h18"/>
          <path d="M5 10v10"/>
          <path d="M9 10v10"/>
          <path d="M13 10v10"/>
          <path d="M17 10v10"/>
          <path d="M3 20h18"/>
          <path d="M12 4 3 8h18l-9-4z"/>
        </svg>
        <h1>BANK</h1>
      </div>
    </div>

    <div class="orbit">
      <div class="icon i1">🌐</div>
      <div class="icon i2">📊</div>
      <div class="icon i3">🤝</div>
      <div class="icon i4">📶</div>
      <div class="icon i5">🔒</div>
      <div class="icon i6">💳</div>
      <div class="icon i7">📡</div>
    </div>

  </div>
</div>

</body>
</html>
